name: Build Overspray IPA
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build (unsigned)
        run: |
          xcodebuild -project Overspray.xcodeproj \
            -scheme Overspray \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            BUILD_DIR=build \
            build

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r build/Release-iphoneos/Overspray.app Payload/
          zip -r Overspray-unsigned.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Overspray-unsigned-ipa
          path: Overspray-unsigned.ipa
